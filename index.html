<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Workspace | 坚果云同步版</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9fbcdb', secondary: '#bbaecc', accent: '#eecba8',
                        success: '#a6cbb5', warning: '#ebd59a', danger: '#e0a2a2',
                        bglight: '#f5f6f8', textmain: '#4a4a59', textmuted: '#8e8e9e'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .soft-card { background: white; border-radius: 1rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); }
            .btn-shadow { box-shadow: 0 4px 0 0 rgba(0,0,0,0.08); transition: all 0.2s; }
            .btn-shadow:active { transform: translateY(4px); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }
    </style>
</head>
<body class="bg-bglight text-textmain font-sans min-h-screen pb-20">
    <div class="container mx-auto px-4 py-8 max-w-[1200px]">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-primary mb-3">PhD Workspace</h1>
            <p id="current-date-time" class="text-textmuted bg-white inline-block px-6 py-2 rounded-full shadow-sm">正在加载...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <nav class="md:col-span-3">
                <div class="soft-card p-5 sticky top-8">
                    <ul class="space-y-3" id="nav-list">
                        <li><button id="nav-checkin" class="w-full text-left px-5 py-3.5 rounded-xl bg-primary text-white font-bold flex justify-between items-center shadow-md"><span>工位打卡</span><i class="fa fa-clock-o"></i></button></li>
                        <li><button id="nav-sync" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 font-bold flex justify-between items-center"><span>云端同步</span><i class="fa fa-refresh text-blue-400"></i></button></li>
                        </ul>
                    <div class="mt-8 border-t pt-6 text-xs font-bold text-gray-400 uppercase tracking-widest">当前客户端</div>
                    <div id="device-info" class="mt-2 text-sm font-black text-primary italic">识别中...</div>
                </div>
            </nav>

            <main class="md:col-span-9">
                <section id="checkin-section" class="soft-card p-8">
                    <h2 class="text-2xl font-black mb-6 border-b pb-4">起居打卡</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="btn-wake" class="bg-warning text-white font-bold py-4 rounded-xl btn-shadow">我起床了</button>
                        <button id="btn-sleep" class="bg-secondary text-white font-bold py-4 rounded-xl btn-shadow">我要睡了</button>
                    </div>
                </section>

                <section id="sync-section" class="soft-card p-8 hidden">
                    <h2 class="text-2xl font-black mb-6 border-b pb-4 text-blue-500">坚果云多端同步</h2>
                    <div class="grid gap-6">
                        <button id="btn-export" class="bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg">导出 JSON 到坚果云</button>
                        <label class="bg-purple-500 text-white font-bold py-4 rounded-xl shadow-lg text-center cursor-pointer">
                            从坚果云导入 JSON <input type="file" id="import-file-input" class="hidden" accept=".json">
                        </label>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        // PWA 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Registered"));
            });
        }

        // 设备识别
        function getDeviceSignature() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) return "iPhone 17 Pro";
            if (/Windows/i.test(ua)) return "Windows 工作站";
            if (/Macintosh/i.test(ua)) return "macOS 端";
            return "Web 端";
        }
        document.getElementById('device-info').textContent = getDeviceSignature();

        // 核心数据逻辑
        const DATA_KEYS = ['checkinData', 'sleepData']; // 简化演示，按需补充
        let D = {};
        const getTodayStr = () => new Date().toISOString().split('T')[0];

        function init() {
            DATA_KEYS.forEach(k => D[k] = JSON.parse(localStorage.getItem(k)) || {});
            document.getElementById('current-date-time').textContent = new Date().toLocaleString();
        }

        // 同步逻辑
        document.getElementById('btn-export').onclick = () => {
            const blob = new Blob([JSON.stringify(D)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `phd_sync_${getTodayStr()}.json`;
            a.click();
        };

        document.getElementById('import-file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                D = JSON.parse(ev.target.result);
                DATA_KEYS.forEach(k => localStorage.setItem(k, JSON.stringify(D[k])));
                alert("同步完成");
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        };

        // 导航切换
        document.getElementById('nav-sync').onclick = () => {
            document.getElementById('checkin-section').classList.add('hidden');
            document.getElementById('sync-section').classList.remove('hidden');
        };
        document.getElementById('nav-checkin').onclick = () => {
            document.getElementById('sync-section').classList.add('hidden');
            document.getElementById('checkin-section').classList.remove('hidden');
        };

        init();
    </script>
</body>
</html>
