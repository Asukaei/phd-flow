<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Workspace | 坚果云同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9fbcdb',    /* 柔和蓝 - 学习/打卡 */
                        secondary: '#bbaecc',  /* 丁香紫 - 科研/任务 */
                        accent: '#eecba8',     /* 蜜桃橙 - 娱乐/复盘 */
                        success: '#a6cbb5',    /* 莫兰迪绿 - 休息/习惯 */
                        warning: '#ebd59a',    /* 柔和黄 - 餐饮/成就 */
                        danger: '#e0a2a2',     /* 脏粉红 - 摸鱼/克制 */
                        bglight: '#f5f6f8',
                        textmain: '#4a4a59',
                        textmuted: '#8e8e9e'
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-shadow { box-shadow: 0 4px 0 0 rgba(0,0,0,0.08); transition: all 0.2s; }
            .btn-shadow:active { transform: translateY(4px); box-shadow: 0 0 0 0 rgba(0,0,0,0); }
            .achievement-popup { animation: slideDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.5s ease-in 5.5s forwards; }
            @keyframes slideDown { 0% { transform: translate(-50%, -150%); opacity: 0; } 100% { transform: translate(-50%, -50%); opacity: 1; } }
            @keyframes fadeOut { 0% { transform: translate(-50%, -50%); opacity: 1; } 100% { transform: translate(-50%, -150%); opacity: 0; } }
            .soft-card { background: white; border-radius: 1rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03); }
        }
    </style>
</head>
<body class="bg-bglight text-textmain font-sans min-h-screen pb-20">
    <div class="container mx-auto px-4 py-8 max-w-[1200px]">
        
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-primary mb-3 drop-shadow-sm tracking-wide">PhD Workspace & Time Flow</h1>
            <p class="text-textmuted font-medium bg-white inline-block px-6 py-2 rounded-full shadow-sm border border-gray-100" id="current-date-time">正在加载时间...</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <nav class="md:col-span-3">
                <div class="soft-card p-5 sticky top-8">
                    <ul class="space-y-3">
                        <li><button id="nav-checkin" class="w-full text-left px-5 py-3.5 rounded-xl bg-primary text-white font-bold flex items-center justify-between shadow-md"><span class="tracking-wide">工位与起居</span><i class="fa fa-clock-o text-lg"></i></button></li>
                        <li><button id="nav-hourly" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">时间日历</span><i class="fa fa-calendar text-lg text-primary"></i></button></li>
                        <li><button id="nav-tasks" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">深度专注</span><i class="fa fa-tasks text-lg text-secondary"></i></button></li>
                        <li><button id="nav-habits" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">每日习惯</span><i class="fa fa-check-square-o text-lg text-success"></i></button></li>
                        <li><button id="nav-journal" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">每日复盘</span><i class="fa fa-book text-lg text-accent"></i></button></li>
                        <li><button id="nav-phone" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">克制诱惑</span><i class="fa fa-mobile text-lg text-danger"></i></button></li>
                        <li><button id="nav-achievements" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">成就殿堂</span><i class="fa fa-trophy text-lg text-warning"></i></button></li>
                        <li><button id="nav-stats" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">数据洞察</span><i class="fa fa-line-chart text-lg text-primary"></i></button></li>
                        <li><button id="nav-sync" class="w-full text-left px-5 py-3.5 rounded-xl hover:bg-gray-50 text-textmain font-bold flex items-center justify-between transition-all"><span class="tracking-wide">云端同步</span><i class="fa fa-refresh text-lg text-blue-400"></i></button></li>
                    </ul>

                    <div class="mt-8 border-t border-gray-100 pt-6">
                        <h3 class="text-sm font-black text-gray-800 mb-4 flex items-center tracking-widest uppercase"><i class="fa fa-dashboard text-primary mr-2"></i>今日状态</h3>
                        <div class="space-y-3 text-sm font-bold">
                            <div class="flex justify-between items-center"><span class="text-gray-400">上午打卡</span><span id="sb-m-in" class="text-gray-300">未打卡</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-400">下午打卡</span><span id="sb-a-in" class="text-gray-300">未打卡</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-400">晚上打卡</span><span id="sb-e-in" class="text-gray-300">未打卡</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-400">手机克制</span><span id="sb-phone" class="text-danger">0 次</span></div>
                            <div class="flex justify-between items-center"><span class="text-gray-400">习惯完成</span><span id="sb-habit" class="text-gray-300">0%</span></div>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="md:col-span-9 relative">
                <section id="checkin-section" class="soft-card p-8 mb-6">
                    <h2 class="text-2xl font-black text-textmain mb-8 flex items-center border-b border-gray-100 pb-4">
                        <i class="fa fa-clock-o mr-3 text-primary text-3xl"></i>起居与工位打卡
                    </h2>
                    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 mb-8 flex flex-col md:flex-row gap-6">
                        <div class="flex-1 bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                            <h3 class="font-bold text-textmain mb-1">起床打卡</h3>
                            <button id="btn-wake" class="bg-warning text-white font-bold py-2 px-6 rounded-lg w-full mb-3">我起床啦</button>
                            <div id="wake-time-display" class="text-sm font-bold text-gray-500">-</div>
                        </div>
                        <div class="flex-1 bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                            <h3 class="font-bold text-textmain mb-1">睡觉打卡</h3>
                            <button id="btn-sleep" class="bg-secondary text-white font-bold py-2 px-6 rounded-lg w-full mb-3">我要睡了</button>
                            <div id="sleep-time-display" class="text-sm font-bold text-gray-500">-</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-primary/10 border border-primary/20 rounded-2xl p-6">
                            <h3 class="font-bold text-primary mb-4 text-center">上午</h3>
                            <button id="morning-checkin" class="w-full bg-primary text-white py-3 rounded-xl font-bold mb-2">上班</button>
                            <button id="morning-checkout" class="w-full bg-white text-primary border-2 border-primary/30 py-2 rounded-xl font-bold" disabled>下班</button>
                        </div>
                        <div class="bg-secondary/10 border border-secondary/20 rounded-2xl p-6">
                            <h3 class="font-bold text-secondary mb-4 text-center">下午</h3>
                            <button id="afternoon-checkin" class="w-full bg-secondary text-white py-3 rounded-xl font-bold mb-2">上班</button>
                            <button id="afternoon-checkout" class="w-full bg-white text-secondary border-2 border-secondary/30 py-2 rounded-xl font-bold" disabled>下班</button>
                        </div>
                        <div class="bg-accent/10 border border-accent/20 rounded-2xl p-6">
                            <h3 class="font-bold text-accent mb-4 text-center">晚上</h3>
                            <button id="evening-checkin" class="w-full bg-accent text-white py-3 rounded-xl font-bold mb-2">上班</button>
                            <button id="evening-checkout" class="w-full bg-white text-accent border-2 border-accent/30 py-2 rounded-xl font-bold" disabled>下班</button>
                        </div>
                    </div>
                </section>

                <section id="sync-section" class="soft-card p-8 mb-6 hidden">
                    <h2 class="text-2xl font-black text-textmain mb-8 flex items-center border-b border-gray-100 pb-4">
                        <i class="fa fa-refresh mr-3 text-blue-400 text-3xl"></i>数据备份与同步
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100 text-center">
                            <h3 class="text-lg font-bold text-blue-600 mb-2">上行：导出到坚果云</h3>
                            <p class="text-xs text-gray-500 mb-6">下载 JSON 并覆盖坚果云同步盘内的旧文件</p>
                            <button id="btn-export" class="w-full bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-600 transition-all">
                                <i class="fa fa-download mr-2"></i> 导出同步文件
                            </button>
                        </div>
                        <div class="bg-purple-50/50 p-6 rounded-2xl border border-purple-100 text-center">
                            <h3 class="text-lg font-bold text-purple-600 mb-2">下行：从坚果云恢复</h3>
                            <p class="text-xs text-gray-500 mb-6">选择坚果云同步盘中最新的备份文件</p>
                            <label class="w-full bg-purple-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-purple-600 transition-all flex items-center justify-center cursor-pointer">
                                <i class="fa fa-upload mr-2"></i> 导入并覆盖
                                <input type="file" id="import-file-input" class="hidden" accept=".json">
                            </label>
                        </div>
                    </div>
                </section>

                <section id="hourly-section" class="soft-card p-8 mb-6 hidden">
                     <h2 class="text-2xl font-black text-textmain mb-8 flex items-center border-b border-gray-100 pb-4"><i class="fa fa-calendar mr-3 text-primary text-3xl"></i>时间块记录</h2>
                     <div class="p-10 text-center text-gray-400">时间块记录功能已激活，请在下方添加今日行程。</div>
                     <div id="blocks-items" class="relative bg-gray-50 rounded-xl p-4 min-h-[400px]"></div>
                </section>

                <section id="tasks-section" class="soft-card p-8 mb-6 hidden">
                    <h2 class="text-2xl font-black text-textmain mb-8 border-b border-gray-100 pb-4">深度专注</h2>
                    <div id="todo-list-container" class="space-y-3"></div>
                </section>

                <section id="stats-section" class="soft-card p-8 mb-6 hidden">
                    <h2 class="text-2xl font-black text-textmain mb-8 border-b border-gray-100 pb-4">数据洞察</h2>
                    <canvas id="chart-checkin-rate" height="200"></canvas>
                </section>

                <section id="achievements-section" class="soft-card p-8 mb-6 hidden">
                    <h2 class="text-2xl font-black text-textmain mb-8 border-b border-gray-100 pb-4">成就殿堂</h2>
                    <div id="ach-grid-focus" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </section>

            </main>
        </div>
    </div>

    <div id="achievement-popup" class="fixed top-[30%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-[2rem] shadow-2xl p-8 w-80 hidden achievement-popup z-50 text-center">
        <div class="bg-yellow-400 w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-4xl shadow-lg">
            <i class="fa fa-trophy"></i>
        </div>
        <h3 class="text-xl font-black mb-2" id="popup-achievement-title">解锁成就</h3>
        <p class="text-gray-500 text-sm" id="popup-achievement-desc"></p>
    </div>

    <script>
        // ================= 数据初始化 =================
        const DATA_KEYS = ['checkinData', 'phoneResistData', 'taskData', 'journalData', 'timeBlocks', 'habitConfig', 'habitRecords', 'unlockedAchievements', 'sleepData', 'todoData'];
        let D = {};

        const getTodayStr = (offset=0) => { const d = new Date(); d.setDate(d.getDate() + offset); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
        const getTimeStr = () => { const d = new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

        function initData() {
            DATA_KEYS.forEach(k => { 
                D[k] = JSON.parse(localStorage.getItem(k)) || (k === 'habitConfig' || k === 'unlockedAchievements' ? [] : {}); 
            });
            if (!D.phoneResistData.totalCount) D.phoneResistData = { totalCount: 0, records: {} };
            saveData();
        }

        function saveData() {
            DATA_KEYS.forEach(k => localStorage.setItem(k, JSON.stringify(D[k])));
            updateSidebar();
        }

        // ================= 导航逻辑 =================
        const sections = ['checkin', 'hourly', 'tasks', 'habits', 'journal', 'phone', 'achievements', 'stats', 'sync'];
        function initNavigation() {
            sections.forEach(sec => {
                const btn = document.getElementById(`nav-${sec}`);
                if(!btn) return;
                btn.addEventListener('click', function() {
                    sections.forEach(s => {
                        const sEl = document.getElementById(`${s}-section`);
                        if(sEl) sEl.classList.add('hidden');
                        const bEl = document.getElementById(`nav-${s}`);
                        if(bEl) bEl.className = bEl.className.replace(/bg-\w+ text-white shadow-md/, 'hover:bg-gray-50 text-textmain');
                    });
                    document.getElementById(`${sec}-section`).classList.remove('hidden');
                    this.className = `w-full text-left px-5 py-3.5 rounded-xl bg-primary text-white font-bold flex items-center justify-between shadow-md`;
                });
            });
        }

        // ================= 同步功能 (坚果云专用) =================
        function initSync() {
            // 导出
            document.getElementById('btn-export').addEventListener('click', () => {
                const backup = {};
                DATA_KEYS.forEach(key => backup[key] = D[key]);
                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `phd_data_sync_${getTodayStr()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert('已生成同步文件，请将其移动至坚果云同步盘覆盖旧文件。');
            });

            // 导入
            document.getElementById('import-file-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (confirm('警告：导入将覆盖此设备上的所有数据！确定继续吗？')) {
                            DATA_KEYS.forEach(key => { if(imported[key]) D[key] = imported[key]; });
                            saveData();
                            alert('数据恢复成功，页面将刷新。');
                            window.location.reload();
                        }
                    } catch (err) { alert('解析文件失败，请确保文件格式正确。'); }
                };
                reader.readAsText(file);
            });
        }

        // ================= UI 更新 =================
        function updateSidebar() {
            const t = getTodayStr();
            const cd = D.checkinData[t] || { morning:{}, afternoon:{}, evening:{} };
            document.getElementById('sb-m-in').textContent = cd.morning?.checkIn || '未打卡';
            document.getElementById('sb-a-in').textContent = cd.afternoon?.checkIn || '未打卡';
            document.getElementById('sb-e-in').textContent = cd.evening?.checkIn || '未打卡';
            document.getElementById('sb-phone').textContent = `${D.phoneResistData.records?.[t]?.count || 0} 次`;
        }

        // ================= 打卡功能 =================
        function initCheckin() {
            const t = getTodayStr();
            if(!D.checkinData[t]) D.checkinData[t] = { morning:{}, afternoon:{}, evening:{} };
            if(!D.sleepData[t]) D.sleepData[t] = { wake:null, sleep:null };

            document.getElementById('btn-wake').onclick = () => {
                D.sleepData[t].wake = getTimeStr();
                document.getElementById('wake-time-display').textContent = `已打卡: ${D.sleepData[t].wake}`;
                saveData();
            };

            document.getElementById('morning-checkin').onclick = () => {
                D.checkinData[t].morning.checkIn = getTimeStr();
                saveData();
                alert('打卡成功！');
            };
        }

        // ================= 启动 =================
        document.addEventListener('DOMContentLoaded', () => {
            initData();
            initNavigation();
            initSync();
            initCheckin();
            updateSidebar();
            setInterval(() => {
                document.getElementById('current-date-time').textContent = new Date().toLocaleString();
            }, 1000);
        });
    </script>
</body>
</html>
